services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: valgoo
      POSTGRES_PASSWORD: valgoo_dev_password
      POSTGRES_DB: valgoo
    ports:
      - '5432:5432'
    volumes:
      - valgoo_pgdata:/var/lib/postgresql/data

volumes:
  valgoo_pgdata:
